<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trust by Design</title>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#f1ece1"/>
    <g transform="translate(30,30)">
      <rect width="40" height="40" rx="6" fill="none" stroke="#1c1a16" stroke-width="3"/>
      <circle cx="20" cy="20" r="9" fill="none" stroke="#e5484d" stroke-width="3"/>
      <line x1="26" y1="26" x2="36" y2="36" stroke="#e5484d" stroke-width="3" stroke-linecap="round"/>
    </g>
  </svg>
</template>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles-core.css" />
<link rel="stylesheet" href="styles-scenes.css" />
</head>
<body>

<div id="stagewrap">
  <div id="stage">
    <div id="scene-root"></div>
    <div id="hud"></div>
  </div>
</div>

<div id="chrome">
  <button class="cbtn" id="c-prev" title="Previous (\u2190)">
    <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7z"/></svg>
  </button>
  <button class="cbtn" id="c-play" title="Play / Pause (Space)" data-playing="true">
    <svg class="play" viewBox="0 0 24 24"><path d="M7 5v14l12-7z"/></svg>
    <svg class="pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
  </button>
  <button class="cbtn" id="c-next" title="Next (\u2192)">
    <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7z"/></svg>
  </button>
  <div id="c-meta">
    <span id="c-name">\u2014</span>
    <span id="c-num">00 / 14</span>
  </div>
  <div id="c-bar"><div id="c-barfill"></div></div>
  <div id="c-dots"></div>
</div>

<div id="tweaks-root"></div>

<!-- engine + content + components + scenes (plain JS, ordered) -->
<script src="engine.js"></script>
<script src="components.js"></script>
<script src="content.js"></script>
<script src="scenes-a.js"></script>
<script src="scenes-b.js"></script>
<script src="scenes-c.js"></script>
<script>window.TBD.boot();</script>

<!-- Tweaks panel (React island, additive) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks-app.jsx"></script>
</body>
</html>
